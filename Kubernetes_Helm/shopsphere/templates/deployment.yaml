{{- range $name, $values := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $values.deploymentName }}
  labels:
    {{ $values.label }}
spec:
  selector:
    matchLabels:
      {{ $values.label }}
  template:
    metadata:
      labels:
        {{ $values.label }}
    spec:
      containers:
      - name: {{ $values.deploymentName }}
        image: {{ $values.imageName }}:{{ $values.imageVersion }}
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: {{ $values.cpu }}
            memory: {{ $values.memory }}
          limits:
            cpu: {{ $values.cpuLimit }}
            memory: {{ $values.memoryLimit }}
        envFrom:
        - configMapRef:
            name: shopsphere-app-cm
        - secretRef:
            name: shopsphere-app-secret
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
---
{{- end }}